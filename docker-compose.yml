version: '3.8'

services:
  alfred-bot:
    build: .
    container_name: alfred-bot
    restart: always
    environment:
      - ALPETA_NUMBER=${ALPETA_NUMBER}
      - NINEROUTER_URL=${NINEROUTER_URL}
      - NINEROUTER_KEY=${NINEROUTER_KEY}
    volumes:
      - alfred_session:/app/alfred_session
      - chat_history:/app/chat_history

volumes:
  alfred_session:
  chat_history: