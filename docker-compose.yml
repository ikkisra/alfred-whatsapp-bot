version: '3.8'

services:
  alfred-bot:
    build: .
    container_name: alfred-bot
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    volumes:
      - alfred_session:/app/alfred_session
      - alfred_chat_history:/app/chat_history

volumes:
  alfred_session:
  alfred_chat_history: