
version: '3.8'

services:
  whatsapp-bot:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: whatsapp-bot
    restart: always
    volumes:
      - .:/app
      - /app/node_modules
      - whatsapp_session:/app/session # Untuk menyimpan data sesi WhatsApp
    environment:
      # Contoh variabel lingkungan, sesuaikan dengan kebutuhan bot Anda
      - NODE_ENV=production
      # - API_KEY=your_api_key
    ports:
      # Jika bot Anda memiliki API atau web interface
      # - "3000:3000"
    # Jika menggunakan whatsapp-web.js dengan Puppeteer, tambahkan opsi berikut:
    # cap_add:
    #   - SYS_ADMIN
    # shm_size: '2gb' # Penting untuk Puppeteer agar tidak kehabisan memori

volumes:
  whatsapp_session:
    driver: local
